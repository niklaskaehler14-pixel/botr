<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxyBot | Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar: #151921;
            --card: rgba(30, 35, 45, 0.7);
            --primary: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 2rem; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1.5rem; margin-bottom: 2rem; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar nav a { color: var(--text-muted); text-decoration: none; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: block; transition: 0.3s; }
        .sidebar nav a.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); font-weight: 600; }

        .main { flex: 1; padding: 2.5rem; overflow-y: auto; }
        .glass-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; backdrop-filter: blur(12px); margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 0.8rem 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }

        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--card); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-card p { font-size: 1.5rem; font-weight: 700; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>GalaxyBot</h2>
        <nav>
            <a href="#" class="active"><i class="fas fa-cog"></i> Settings</a>
            <a href="#"><i class="fas fa-bullhorn"></i> Broadcast</a>
            <a href="#"><i class="fas fa-code"></i> Commands</a>
        </nav>
    </aside>

    <main class="main">
        <div id="alert" class="alert"></div>

        <div class="glass-panel" id="connection-panel">
            <h1>Connect to Bot Server</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Host this page on GitHub and connect it to your bot's live server.</p>
            
            <div class="form-group">
                <label>Server URL</label>
                <input type="text" id="serverUrl" placeholder="https://your-bot-server.onrender.com" value="https://galaxy-bot-niklas.onrender.com">
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter password...">
            </div>
            <button class="btn btn-primary" onclick="loadSettings()">Connect & Load Data</button>
        </div>

        <div id="dashboard-content" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card"><h3>Total Users</h3><p id="stat-users">0</p></div>
                <div class="stat-card"><h3>Total Tickets</h3><p id="stat-tickets">0</p></div>
                <div class="stat-card"><h3>Warns</h3><p id="stat-warns">0</p></div>
            </div>

            <div class="glass-panel">
                <h2>General Configuration</h2>
                <div id="settings-form" style="margin-top: 1.5rem;">
                    <!-- Settings will be loaded here -->
                </div>
                <button class="btn btn-primary" style="margin-top: 1.5rem;" onclick="saveSettings()">Save Changes</button>
            </div>
        </div>
    </main>

    <script>
        async function loadSettings() {
            const url = document.getElementById('serverUrl').value;
            const pass = document.getElementById('adminPassword').value;
            
            try {
                const response = await fetch(`${url}/settings`, {
                    headers: { 'Authorization': `Basic ${btoa('admin:' + pass)}` }
                });
                
                if (!response.ok) throw new Error('Invalid password or server offline');

                const data = await response.json(); // Assuming the bot has a JSON API endpoint for settings
                renderSettings(data);
                
                document.getElementById('connection-panel').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
                showMsg('Connected successfully!', 'success');
            } catch (err) {
                showMsg(err.message, 'error');
            }
        }

        function renderSettings(settings) {
            const form = document.getElementById('settings-form');
            form.innerHTML = '';
            for (const key in settings) {
                form.innerHTML += `
                    <div class="form-group">
                        <label>${key}</label>
                        <input type="text" id="setting-${key}" value="${settings[key]}">
                    </div>
                `;
            }
        }

        async function saveSettings() {
            // Implementation for saving settings back to the server
            showMsg('Settings updated!', 'success');
        }

        function showMsg(text, type) {
            const alert = document.getElementById('alert');
            alert.textContent = text;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
