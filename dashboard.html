<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalaxyBot Dashboard | Static Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #151921; --primary: #6366f1; --text: #f8fafc; --border: rgba(255,255,255,0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 2rem; }
        .main { flex: 1; padding: 2rem; }
        .glass-panel { background: rgba(30, 35, 45, 0.7); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; backdrop-filter: blur(10px); }
        h1 { margin-top: 0; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
        input, select { width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: white; }
        .btn { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; }
        #status { padding: 10px; border-radius: 8px; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>GalaxyBot</h2>
        <nav style="display: flex; flex-direction: column; gap: 10px; margin-top: 2rem;">
            <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">Settings</a>
            <a href="#" style="color: #94a3b8; text-decoration: none;">Tickets</a>
            <a href="#" style="color: #94a3b8; text-decoration: none;">Logs</a>
        </nav>
    </aside>
    <main class="main">
        <div id="status"></div>
        <div class="glass-panel">
            <h1>API Settings</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">Connect this static dashboard to your running bot server.</p>
            
            <div class="form-group">
                <label>Server URL</label>
                <input type="text" id="serverUrl" placeholder="https://your-bot-server.onrender.com" value="http://localhost:11501">
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter password...">
            </div>
            <button class="btn" onclick="saveConfig()">Save & Connect</button>
        </div>

        <div id="settings-area" style="margin-top: 2rem; display: none;" class="glass-panel">
            <h2>Bot Configuration</h2>
            <!-- This would be populated dynamically via API -->
            <p>Once connected, your settings will appear here.</p>
        </div>
    </main>

    <script>
        function saveConfig() {
            const url = document.getElementById('serverUrl').value;
            const pass = document.getElementById('adminPassword').value;
            localStorage.setItem('bot_url', url);
            localStorage.setItem('bot_pass', pass);
            
            showStatus('Configuration saved locally!', 'success');
            document.getElementById('settings-area').style.display = 'block';
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            el.style.color = type === 'success' ? '#10b981' : '#ef4444';
        }
    </script>
</body>
</html>
